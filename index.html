<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>号码切割工具</title>


<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  background: #f5f5f7;
  padding: 60px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

:root {
  --main-panel-height: 684px;
}

.lang-switch {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 90px;
  height: 36px;
  border-radius: 18px;
  background: #007aff;
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  transition: 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lang-switch:hover {
  background: #0062cc;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,122,255,0.25);
}

.page-title {
  padding: 20px 0;
  margin: 0 0 28px 0;
  font-size: 34px;
  font-weight: 700;
  color: #1d1d1f;
  text-align: center;
  letter-spacing: -0.5px;
}

.top-row {
  display: flex;
  align-items: stretch;
  gap: 24px;
  margin-bottom: 32px;
}

.col-input { width: 30%; height: var(--main-panel-height); }
.col-middle { width: 30%; height: var(--main-panel-height); display: flex; flex-direction: column; gap: 24px; }
.col-right { width: 40%; height: var(--main-panel-height); display: flex; flex-direction: column; gap: 24px; }
.col-input > .card { height: 100%; }

/* ========== 核心修改：三个卡片全部用固定高度 ========== */
.stat-card {
  width: 100%;
  height: 280px; /* 固定高度，和下面两个完全一样 */
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}
.stat-num {
  font-size: 32px;
  font-weight: 700;
  color: #007aff;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 18px;
  color: #86868b;
}
.preview-tip {
  font-size: 12px;
  color: #007aff;
  margin-top: 4px;
  display: none;
}
.stat-card[clickable="true"] .preview-tip {
  display: block;
}

.stat-row {
  display: flex;
  gap: 12px;
  width: 100%;
}
.stat-row .stat-card {
  height: 220px; /* 和上面的固定高度完全一致 */
}

.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  padding: 32px;
  height: 100%;
  display: flex;
  flex-direction: column;
  transition: 0.28s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}
.card-title {
  font-size: 20px;
  font-weight: 600;
  color: #1d1d1f;
  margin-bottom: 24px;
}
#numberInput {
  flex: 1;
  width: 100%;
  border: none;
  background: #f9f9fb;
  border-radius: 12px;
  padding: 20px;
  font-size: 15px;
  resize: none;
  color: #1d1d1f;
  max-height: 500px;
}
#numberInput:focus {
  outline: none;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
}

.input-import-row {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  align-items: center;
}
.input-file-btn {
  width: 100%;
  height: 48px;
  border-radius: 14px;
  border: 1px dashed #c7c7cc;
  background: #fbfbfd;
  color: #1d1d1f;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.22s;
}
.input-file-btn:hover {
  background: #f2f7ff;
  border-color: #007aff;
  color: #007aff;
  transform: translateY(-1px);
}

.import-card { height: 280px; }
.drop-area {
  flex: 1;
  border: 2px dashed #d2d2d7;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #86868b;
  cursor: pointer;
  background: #fafafa;
}
.drop-area.dragover {
  border-color: #007aff;
  color: #007aff;
  background: rgba(0,122,255,0.06);
}
.drop-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.drop-desc { font-size: 13px; text-align: center; line-height: 1.4; }

/* 隐藏文件选择按钮 */
#fileInput {
  position: absolute;
  width: 0;
  height: 0;
  opacity: 0;
  overflow: hidden;
}


.page-drag-hint {
  text-align: center;
  color: #86868b;
  font-size: 14px;
  margin: -18px 0 28px;
  letter-spacing: -0.1px;
}

.page-drop-overlay {
  position: fixed;
  inset: 0;
  z-index: 999998;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(245, 245, 247, 0.78);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  pointer-events: none;
}
.page-drop-overlay.show {
  display: flex;
}
.page-drop-box {
  width: min(520px, calc(100vw - 48px));
  min-height: 180px;
  border: 2px dashed #007aff;
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.9);
  box-shadow: 0 18px 60px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #1d1d1f;
  padding: 28px;
}
.page-drop-icon {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #eaf4ff;
  color: #007aff;
  font-size: 30px;
  font-weight: 600;
  margin-bottom: 16px;
}
.page-drop-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
.page-drop-desc {
  font-size: 14px;
  color: #86868b;
}

.config-card { height: auto; min-height: 380px; }

/* 中间列：数据范围自适应高度，剩余空间补给切割配置 */
.middle-card {
  min-height: 0;
  padding: 28px;
}
.middle-card .card-title {
  margin-bottom: 18px;
}
.range-card {
  flex: 0 0 auto;
  min-height: 0;
}
.config-card {
  flex: 1 1 auto;
  min-height: 0;
  overflow: visible;
}
.range-group,
.middle-card .config-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 0;
}
.range-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.range-item,
.middle-card .config-item {
  min-height: 56px;
  height: auto;
  padding: 14px 16px;
  background: #f9f9fb;
  border: 1px solid #e5e5ea;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
}
.range-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.range-item:hover,
.middle-card .config-item:hover {
  background: #fff;
  border-color: #c9dfff;
}
.range-item.active,
.middle-card .config-item.active {
  background: #e4f3ff;
  border-color: #007aff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.08);
}
.range-main-text,
.middle-card .config-text {
  flex: 1;
  font-size: 15px;
  color: #1d1d1f;
  font-weight: 600;
  white-space: nowrap;
}
.range-inline-text {
  font-size: 15px;
  color: #1d1d1f;
  font-weight: 600;
  white-space: nowrap;
}
.range-input,
.middle-card .config-input {
  width: 74px;
  height: 34px;
  padding: 6px 8px;
  background: #fff;
  border: 1px solid #d8d8df;
  border-radius: 9px;
  font-size: 14px;
  text-align: center;
}
.range-input:focus,
.middle-card .config-input:focus {
  outline: none;
  border-color: #007aff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
}
.custom-range-item {
  align-items: stretch;
  flex-direction: column;
  gap: 10px;
}
.range-custom-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.range-custom-fields label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 10px 12px;
  background: #fff;
  border: 1px solid #ededf2;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  color: #1d1d1f;
}
.range-custom-fields .range-input {
  width: 68px;
}
.range-mini-tip {
  font-size: 12px;
  line-height: 1.35;
  color: #86868b;
}
.range-status {
  position: absolute;
  right: 16px;
  bottom: 5px;
  font-size: 12px;
  font-weight: 500;
}
.range-status.unadded { color: #ff9500; }
.range-status.added { color: #34c759; }
.range-modal-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.range-quick-btn {
  height: 36px;
  border-radius: 10px;
  border: 1px solid #e5e5ea;
  background: #f9f9fb;
  color: #1d1d1f;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}
.range-quick-btn:hover {
  background: #e4f3ff;
  border-color: #007aff;
  color: #007aff;
}

.export-config-box {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid #ededf2;
}
.export-config-title {
  font-size: 15px;
  font-weight: 700;
  color: #1d1d1f;
  margin-bottom: 10px;
}
.export-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.export-option {
  min-height: 52px;
  padding: 12px 14px;
  background: #f9f9fb;
  border: 1px solid #e5e5ea;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
  font-weight: 650;
  color: #1d1d1f;
}
.export-option:hover {
  background: #fff;
  border-color: #c9dfff;
}
.export-option.active {
  background: #e4f3ff;
  border-color: #007aff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.08);
}
.export-option input {
  width: 16px;
  height: 16px;
  accent-color: #007aff;
}

.middle-card .seg-status {
  right: 16px;
  bottom: 5px;
}

.config-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 8px;
}
.config-item {
  display: flex;
  align-items: center;
  padding: 18px 20px;
  background: #f9f9fb;
  border: 1px solid #e5e5ea;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  width: 100%;
  height: 64px;
  position: relative;
}
.config-item.active {
  background: #e4f3ff;
  border-color: #007aff;
}
.config-text {
  flex: 1;
  font-size: 16px;
  color: #1d1d1f;
  font-weight: 500;
}
.config-input {
  width: 120px;
  padding: 10px 12px;
  background: #fff;
  border: 1px solid #e5e5ea;
  border-radius: 8px;
  font-size: 16px;
  text-align: center;
}
.config-input:focus {
  outline: none;
  border-color: #007aff;
}
.seg-status {
  position: absolute;
  right: 16px;
  bottom: 4px;
  font-size: 12px;
  font-weight: 500;
}
.seg-status.unadded { color: #ff9500; }
.seg-status.added { color: #34c759; }

.btn {
  height: 44px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: 0.25s;
  padding: 0 20px;
}
.btn-primary {
  background: #007aff;
  color: #fff;
}
.btn-primary:hover {
  background: #0062cc;
}
.btn-block {
  height: 56px;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}
.btn-block:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}
.btn-main {
  background: #007aff;
  color: #fff;
}
.btn-second {
  background: #e5e5ea;
  color: #1d1d1f;
}
.btn-second:hover {
  background: #d8d8df;
}
button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.loading-mask {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  color: #007aff;
}
.loading-mask.show { display: flex; }

.preview-wrapper {
  margin-top: 12px;
  display: none;
}
.preview-card {
  border-radius: 20px;
  background: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  padding: 28px;
  max-height: 600px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.preview-header {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.preview-header .btn {
  flex: 1;
  min-width: 160px;
}
.preview-table-container {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
  max-height: 450px;
  border-radius: 12px;
  border: 1px solid #f0f0f5;
}
.preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  min-width: 800px;
}
.preview-table th {
  background: #f9f9fb;
  font-weight: 600;
  padding: 12px 16px;
  text-align: center;
  border-bottom: 1px solid #e5e5ea;
  cursor: pointer;
  position: sticky;
  top: 0;
  z-index: 10;
}
.preview-table th.active {
  background: #d1e7ff;
  color: #007aff;
}
.preview-table td {
  padding: 10px 16px;
  text-align: center;
  border-bottom: 1px solid #f0f0f5;
}
.preview-table td.active-col {
  background: #eef6ff;
  color: #007aff;
  font-weight: 500;
}
.preview-table tr:nth-child(even) {
  background: #f9f9fb;
}

.list-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999999;
  display: none;
  align-items: center;
  justify-content: center;
}
.list-modal.show { display: flex; }
.list-box {
  background: #fff;
  width: 90%;
  max-width: 600px;
  border-radius: 20px;
  padding: 30px;
  max-height: 80vh;
  overflow-y: auto;
}
.list-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
  text-align: center;
}
.list-content {
  max-height: 300px;
  overflow-y: auto;
  padding: 10px;
  background: #f9f9fb;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-line;
}
.list-close {
  margin-top: 20px;
  width: 100%;
}

.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99999;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-split {
  width: 900px;
  max-width: 95vw;
  display: flex;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}
.modal-left {
  width: 50%;
  padding: 24px;
  border-right: 1px solid #e5e5ea;
}
.modal-right {
  width: 50%;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.modal-header {
  margin-bottom: 20px;
}
.modal-header h3 {
  font-size: 18px;
  font-weight: 600;
  color: #1d1d1f;
}
.modal-close {
  position: absolute;
  top: 16px;
  right: 20px;
  background: none;
  border: none;
  font-size: 24px;
  color: #86868b;
  cursor: pointer;
}
.modal-form-item {
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.modal-form-item label {
  font-size: 14px;
  font-weight: 500;
  color: #1d1d1f;
}
.modal-form-item input,
.modal-form-item select {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #e5e5ea;
  font-size: 15px;
  background: #f9f9fb;
}
.modal-form-item input:focus,
.modal-form-item select:focus {
  outline: none;
  border-color: #007aff;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
}
.segment-item {
  padding: 12px 14px;
  background: #f9f9fb;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.segment-text {
  font-size: 14px;
  color: #1d1d1f;
}
.added-list {
  flex: 1;
  overflow-y: auto;
  max-height: 400px;
}
.modal-footer {
  margin-top: 20px;
  text-align: right;
}



/* ===== v18 布局修复：中间卡片高度 + 前/后输入项不溢出 ===== */
@media (min-width: 769px) {
  .col-middle {
    min-height: 0;
    overflow: visible;
  }

  /* 原 .card 默认 height:100%，会让数据范围卡片占满整列，导致切割配置被挤到下面。这里专门覆盖中间两张卡片。 */
  .col-middle > .card.middle-card {
    height: auto;
    box-sizing: border-box;
  }

  .col-middle > .range-card {
    flex: 0 0 auto;
    min-height: 0;
  }

  .col-middle > .config-card {
    flex: 1 1 0;
    height: auto;
    min-height: 0;
    overflow: visible;
  }

  .range-row {
    width: 100%;
    min-width: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 8px;
  }

  .range-row .range-item {
    min-width: 0;
    width: 100%;
    padding: 12px 10px;
    gap: 6px;
    justify-content: center;
  }

  .range-row .range-inline-text {
    flex: 0 0 auto;
    font-size: 14px;
  }

  .range-row .range-input {
    width: 58px;
    min-width: 0;
    padding: 6px 4px;
  }
}

@media (min-width: 769px) {
  #shareSelectedTxt,
  #shareAllTxt {
    display: none !important;
  }
}

@media (max-width: 768px) {
  body {
    padding: 60px 12px 20px;
  }
  .page-title {
    font-size: 24px;
  }

  .page-drag-hint {
    margin: -14px 0 20px;
    font-size: 13px;
  }
  .top-row {
    flex-direction: column;
    gap: 16px;
  }
  .col-input, .col-middle, .col-right {
    width: 100%;
    height: auto;
  }
  .col-input > .card {
    height: auto;
  }
  .col-middle {
    min-height: auto;
  }
  .middle-card {
    min-height: auto;
    padding: 24px;
  }
  .range-row,
  .range-custom-fields {
    grid-template-columns: 1fr;
  }

  /* 手机端卡片自动高度，不挤压、不拉伸 */
  .stat-card {
    height: auto !important;
    min-height: 120px !important;
    padding: 20px;
  }
  .stat-row {
    flex-direction: column;
    gap: 12px;
  }

  /* 按钮间距优化 */
  .col-right {
    gap: 12px !important;
  }
  .btn-block {
    height: 50px;
  }
  .input-file-btn {
    height: 46px;
    font-size: 14px;
  }

  /* 手机端预览表格横向滚动更友好 */
  .preview-table {
    min-width: 600px;
  }
  .preview-header {
    gap: 8px;
  }
  .preview-header .btn {
    min-width: 140px;
    font-size: 13px;
    padding: 0 10px;
  }

  /* 弹窗适配手机 */
  .modal-split {
    flex-direction: column;
    width: 95vw;
  }
  .modal-left, .modal-right {
    width: 100%;
    border-right: none;

function cleanPhone(s) {
  // 统一清洗成 11 位、开头带 1 的号码：1XXXXXXXXXX
  // 支持格式示例：5000000000、15000000000、+1 (500) 000-0000、1-500-000-0000。
  // 如果一行里带空格、括号、横线等符号，会先去掉非数字字符。
  const digits = String(s || '').replace(/\D/g, '');
  if (!digits) return null;

  let core10 = '';

  if (digits.length >= 11 && digits.startsWith('1')) {
    // 1 + 10 位，后面如果有备注/分机数字，忽略 11 位之后的内容。
    core10 = digits.slice(1, 11);
  } else if (digits.length >= 10) {
    // 没有国家码 1 的号码，取前 10 位并补 1。
    core10 = digits.slice(0, 10);
  } else {
    return null;
  }

  if (core10.length !== 10) return null;
  return '1' + core10;
}

function updateStats() {
  const t = el.numberInput.value.trim();
  if (!t) {
    validNumbers = [];
    duplicateNumbers = [];
    invalidNumbers = [];
    el.validNum.textContent = 0;
    el.dupNum.textContent = 0;
    el.invalidNum.textContent = 0;
    el.processBtn.disabled = true;
    el.dupCard.removeAttribute('clickable');
    el.invalidCard.removeAttribute('clickable');
    return;
  }

  const lines = t.split(/\n/).map(s => s.trim()).filter(Boolean);
  const cleaned = lines.map(s => cleanPhone(s)).filter(x => x !== null);
  const unique = [...new Set(cleaned)];
  
  const dupMap = {};
  cleaned.forEach(n => {
    dupMap[n] = (dupMap[n] || 0) + 1;
  });
  const dups = [];
  for (const k in dupMap) {
    if (dupMap[k] > 1) dups.push(k);
  }

  const inv = lines.filter(s => cleanPhone(s) === null);

  validNumbers = unique;
  duplicateNumbers = dups;
  invalidNumbers = inv;

  el.validNum.textContent = unique.length;
  el.dupNum.textContent = dups.length;
  el.invalidNum.textContent = inv.length;
  el.processBtn.disabled = !unique.length;

  if (dups.length > 0) el.dupCard.setAttribute('clickable', 'true');
  else el.dupCard.removeAttribute('clickable');
  
  if (inv.length > 0) el.invalidCard.setAttribute('clickable', 'true');
  else el.invalidCard.removeAttribute('clickable');
}

function initFileDrop() {
  const overlay = document.getElementById('pageDropOverlay');

  function hasFiles(e) {
    return e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files');
  }

  function getFileKind(file) {
    const name = (file && file.name ? file.name : '').toLowerCase();
    if (name.endsWith('.txt')) return 'txt';
    if (name.endsWith('.csv')) return 'csv';
    if (name.endsWith('.xlsx')) return 'xlsx';
    if (name.endsWith('.xls')) return 'xls';
    if (file && file.type === 'text/plain') return 'txt';
    return '';
  }

  function resetAfterImport() {
    segmentList = [];
    rangeList = [];
    selectedGroups.clear();
    chunks = [];
    workingNumbers = [];
    updateSegStatus();
    updateRangeStatus();
    el.resultWrapper.style.display = 'none';
    el.previewTable.innerHTML = '';
  }

  function applyImportedText(text) {
    el.numberInput.value = text || '';
    resetAfterImport();
    updateStats();
  }

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result || '');
      reader.onerror = reject;
      reader.readAsText(file, 'utf-8');
    });
  }

  function parseCsvFirstColumn(text) {
    const rows = String(text || '').split(/\r?\n/);
    return rows.map(row => {
      const line = row.trim();
      if (!line) return '';
      if (line.startsWith('"')) {
        let value = '';
        for (let i = 1; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"' && line[i + 1] === '"') {
            value += '"';
            i++;
          } else if (ch === '"') {
            break;
          } else {
            value += ch;
          }
        }
        return value.trim();
      }
      return line.split(',')[0].trim();
    }).filter(Boolean).join('\n');
  }

  function findEndOfCentralDirectory(view) {
    const min = Math.max(0, view.byteLength - 0xffff - 22);
    for (let i = view.byteLength - 22; i >= min; i--) {
      if (view.getUint32(i, true) === 0x06054b50) return i;
    }
    return -1;
  }

  function parseZipDirectory(buffer) {
    const view = new DataView(buffer);
    const eocd = findEndOfCentralDirectory(view);
    if (eocd < 0) throw new Error('ZIP EOCD not found');

    const totalEntries = view.getUint16(eocd + 10, true);
    const centralOffset = view.getUint32(eocd + 16, true);
    const entries = {};
    let ptr = centralOffset;
    const decoder = new TextDecoder('utf-8');

    for (let i = 0; i < totalEntries; i++) {
      if (view.getUint32(ptr, true) !== 0x02014b50) break;
      const method = view.getUint16(ptr + 10, true);
      const compressedSize = view.getUint32(ptr + 20, true);
      const uncompressedSize = view.getUint32(ptr + 24, true);
      const nameLen = view.getUint16(ptr + 28, true);
      const extraLen = view.getUint16(ptr + 30, true);
      const commentLen = view.getUint16(ptr + 32, true);
      const localOffset = view.getUint32(ptr + 42, true);
      const nameBytes = new Uint8Array(buffer, ptr + 46, nameLen);
      const name = decoder.decode(nameBytes);

      entries[name] = { name, method, compressedSize, uncompressedSize, localOffset, buffer };
      ptr += 46 + nameLen + extraLen + commentLen;
    }

    return entries;
  }

  async function inflateRaw(bytes) {
    if (typeof DecompressionStream === 'undefined') {
      throw new Error('DecompressionStream not supported');
    }

    try {
      const ds = new DecompressionStream('deflate-raw');
      const writer = ds.writable.getWriter();
      await writer.write(bytes);
      await writer.close();
      return new Uint8Array(await new Response(ds.readable).arrayBuffer());
    } catch (err) {
      const ds = new DecompressionStream('deflate');
      const writer = ds.writable.getWriter();
      await writer.write(bytes);
      await writer.close();
      return new Uint8Array(await new Response(ds.readable).arrayBuffer());
    }
  }

  async function readZipEntry(entries, name) {
    const entry = entries[name];
    if (!entry) return '';

    const view = new DataView(entry.buffer);
    const localOffset = entry.localOffset;
    if (view.getUint32(localOffset, true) !== 0x04034b50) throw new Error('Invalid local header');

    const localNameLen = view.getUint16(localOffset + 26, true);
    const localExtraLen = view.getUint16(localOffset + 28, true);
    const dataStart = localOffset + 30 + localNameLen + localExtraLen;
    const compressed = new Uint8Array(entry.buffer, dataStart, entry.compressedSize);

    let data;
    if (entry.method === 0) {
      data = compressed;
    } else if (entry.method === 8) {
      data = await inflateRaw(compressed);
    } else {
      throw new Error('Unsupported ZIP compression method: ' + entry.method);
    }

    return new TextDecoder('utf-8').decode(data);
  }

  function parseXml(xmlText) {
    const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) throw new Error('XML parse error');
    return doc;
  }

  function getRelMap(relsXml) {
    const map = {};
    if (!relsXml) return map;
    const doc = parseXml(relsXml);
    Array.from(doc.getElementsByTagName('Relationship')).forEach(rel => {
      map[rel.getAttribute('Id')] = rel.getAttribute('Target');
    });
    return map;
  }

  function resolveSheetPath(workbookXml, relsXml) {
    const workbook = parseXml(workbookXml);
    const firstSheet = workbook.getElementsByTagName('sheet')[0];
    if (!firstSheet) return 'xl/worksheets/sheet1.xml';

    const rid = firstSheet.getAttribute('r:id') || firstSheet.getAttribute('id');
    const relMap = getRelMap(relsXml);
    let target = rid && relMap[rid] ? relMap[rid] : 'worksheets/sheet1.xml';

    if (target.startsWith('/')) target = target.slice(1);
    if (!target.startsWith('xl/')) target = 'xl/' + target;
    return target;
  }

  function parseSharedStrings(sharedXml) {
    if (!sharedXml) return [];
    const doc = parseXml(sharedXml);
    return Array.from(doc.getElementsByTagName('si')).map(si => {
      return Array.from(si.getElementsByTagName('t')).map(t => t.textContent || '').join('');
    });
  }

  function normalizeExcelValue(value) {
    let text = String(value == null ? '' : value).trim();
    if (/^[+-]?\d+(\.\d+)?e[+-]?\d+$/i.test(text)) {
      const n = Number(text);
      if (Number.isFinite(n)) text = Math.round(n).toString();
    }
    return text;
  }

  function extractAColumn(sheetXml, sharedStrings) {
    const doc = parseXml(sheetXml);
    const cells = Array.from(doc.getElementsByTagName('c'));
    const values = [];

    cells.forEach((cell, index) => {
      const ref = cell.getAttribute('r') || '';
      if (ref && !/^A\d+$/i.test(ref)) return;
      if (!ref && index !== 0) return;

      const rowMatch = ref.match(/\d+/);
      const row = rowMatch ? parseInt(rowMatch[0], 10) : index + 1;
      const type = cell.getAttribute('t');
      let value = '';

      if (type === 's') {
        const v = cell.getElementsByTagName('v')[0];
        const idx = v ? parseInt(v.textContent, 10) : -1;
        value = sharedStrings[idx] || '';
      } else if (type === 'inlineStr') {
        value = Array.from(cell.getElementsByTagName('t')).map(t => t.textContent || '').join('');
      } else {
        const v = cell.getElementsByTagName('v')[0];
        value = v ? v.textContent : '';
      }

      value = normalizeExcelValue(value);
      if (value) values.push({ row, value });
    });

    values.sort((a, b) => a.row - b.row);
    return values.map(item => item.value).join('\n');
  }

  async function importXlsxFile(file) {
    const buffer = await file.arrayBuffer();
    const entries = parseZipDirectory(buffer);
    const workbookXml = await readZipEntry(entries, 'xl/workbook.xml');
    const relsXml = await readZipEntry(entries, 'xl/_rels/workbook.xml.rels');
    const sharedXml = await readZipEntry(entries, 'xl/sharedStrings.xml');
    const sheetPath = resolveSheetPath(workbookXml, relsXml);
    const sheetXml = await readZipEntry(entries, sheetPath);
    const sharedStrings = parseSharedStrings(sharedXml);
    return extractAColumn(sheetXml, sharedStrings);
  }

  async function importFile(file) {
    const lang = i18n[currentLang];
    const kind = getFileKind(file);

    if (!kind) {
      alert(lang.file_type_error);
      return;
    }
    if (kind === 'xls') {
      alert(lang.xls_not_supported || lang.file_type_error);
      return;
    }

    try {
      el.loading.classList.add('show');
      let text = '';

      if (kind === 'txt') {
        text = await readFileAsText(file);
      } else if (kind === 'csv') {
        text = parseCsvFirstColumn(await readFileAsText(file));
      } else if (kind === 'xlsx') {
        text = await importXlsxFile(file);
      }

      if (!String(text || '').trim()) {
        alert(kind === 'xlsx' ? (lang.excel_empty_error || lang.range_empty_error) : lang.file_read_error);
        return;
      }

      importedFileBaseName = stripFileExtension(file && file.name);
      applyImportedText(text);
    } catch (err) {
      console.error(err);
      alert(kind === 'xlsx' ? (lang.excel_parse_error || lang.file_read_error) : lang.file_read_error);
    } finally {
      el.loading.classList.remove('show');
      if (el.fileInput) el.fileInput.value = '';
    }
  }

  function showOverlay() {
    if (overlay) overlay.classList.add('show');
  }

  function hideOverlay() {
    if (overlay) overlay.classList.remove('show');
  }

  if (el.importFileBtn && el.fileInput) {
    el.importFileBtn.addEventListener('click', () => el.fileInput.click());
    el.fileInput.addEventListener('change', () => {
      const file = el.fileInput.files && el.fileInput.files[0];
      if (file) importFile(file);
    });
  }

  document.addEventListener('dragenter', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    showOverlay();
  });

  document.addEventListener('dragover', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
    showOverlay();
  });

  document.addEventListener('dragleave', e => {
    if (!hasFiles(e)) return;
    const leavingWindow =
      e.clientX <= 0 || e.clientY <= 0 ||
      e.clientX >= window.innerWidth || e.clientY >= window.innerHeight;
    if (leavingWindow) hideOverlay();
  });

  document.addEventListener('drop', e => {
    if (!hasFiles(e)) return;
    e.preventDefault();
    hideOverlay();

    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    importFile(file);
  });
}

function isRangeOverlap(newStart, newEnd) {
  for (let i = 0; i < rangeList.length; i++) {
    if (i === rangeEditIndex) continue;
    const r = rangeList[i];
    if (!(newEnd < r.start || newStart > r.end)) return true;
  }
  return false;
}

  let nextStart = 1;
  if (rangeList.length > 0) {
    const sorted = [...rangeList].sort((a, b) => a.end - b.end);
    nextStart = sorted[sorted.length - 1].end + 1;
  }

  const maxEnd = getCurrentTotalCount();
  if (nextStart > maxEnd) nextStart = '';
  rangeEl.start.value = nextStart || '';
  rangeEl.end.value = '';
  rangeEl.end.placeholder = maxEnd > 0
    ? (currentLang === 'zh' ? `最后：${maxEnd}` : `Last: ${maxEnd}`)
    : '';

  rangeEl.modal.classList.add('show');
  renderRangeAddedList();
}

function closeRangeModal() { rangeEl.modal.classList.remove('show'); }
rangeEl.closeX.addEventListener('click', closeRangeModal);
rangeEl.finishBtn.addEventListener('click', closeRangeModal);

rangeEl.quickAll.addEventListener('click', () => {
  const total = getCurrentTotalCount();
  rangeEl.start.value = total ? 1 : '';
  rangeEl.end.value = total || '';
});

rangeEl.quickLast.addEventListener('click', () => {
  const total = getCurrentTotalCount();
  if (!total) return;
  const n = 2000;
  rangeEl.start.value = Math.max(1, total - n + 1);
  rangeEl.end.value = total;
});

rangeEl.quickNext.addEventListener('click', () => {
  const total = getCurrentTotalCount();
  if (!total) return;
  let nextStart = 1;
  if (rangeList.length > 0) {
    const sorted = [...rangeList].sort((a, b) => a.end - b.end);
    nextStart = sorted[sorted.length - 1].end + 1;
  }
  rangeEl.start.value = nextStart <= total ? nextStart : '';
  rangeEl.end.value = '';
});

rangeEl.saveBtn.addEventListener('click', () => {
  const lang = i18n[currentLang];
  const total = getCurrentTotalCount();
  let s = parseInt(rangeEl.start.value, 10) || 0;
  const rawEnd = String(rangeEl.end.value || '').trim();
  let e = rawEnd ? (parseInt(rawEnd, 10) || 0) : total;

  if (!total || s <= 0 || e <= 0 || s > e) {
    alert(lang.range_invalid_error);
    return;
  }

  if (s > total) {
    alert(lang.range_empty_error);
    return;
  }

  e = Math.min(e, total);

  if (isRangeOverlap(s, e)) {
    alert(lang.range_overlap_error || lang.overlap_error);
    return;
  }

  const item = { start: s, end: e };
  if (rangeEditIndex === -1) rangeList.push(item);
  else rangeList[rangeEditIndex] = item;

  rangeList.sort((a, b) => a.start - b.start);
  rangeEditIndex = -1;
  updateRangeStatus();
  renderRangeAddedList();
  resetRangeDependentState();

  const last = rangeList[rangeList.length - 1];
  const next = last ? last.end + 1 : 1;
  rangeEl.start.value = next <= total ? next : '';
  rangeEl.end.value = '';
  rangeEl.formTitle.textContent = lang.range_add_title || lang.range_custom;
  rangeEl.saveBtn.textContent = lang.add_btn;
});

function renderRangeAddedList() {
  rangeEl.addedList.innerHTML = '';
  const lang = i18n[currentLang];

  rangeList.forEach((seg, i) => {
    const count = Math.max(0, seg.end - seg.start + 1);
    const txt = `${seg.start}~${seg.end} | ${count}${lang.range_unit || ''}`;
    const div = document.createElement('div');
    div.className = 'segment-item';
    div.innerHTML = `
      <span class="segment-text">${txt}</span>
      <div>
        <button class="btn btn-sm btn-range-edit" data-i="${i}">${lang.edit_btn}</button>
        <button class="btn btn-sm btn-range-del" data-i="${i}">${lang.del_btn}</button>
      </div>
    `;
    rangeEl.addedList.appendChild(div);
  });

  document.querySelectorAll('.btn-range-edit').forEach(b => {
    b.onclick = () => {
      const i = parseInt(b.dataset.i, 10);
      const seg = rangeList[i];
      if (!seg) return;
      rangeEditIndex = i;
      rangeEl.formTitle.textContent = i18n[currentLang].edit_btn;
      rangeEl.saveBtn.textContent = i18n[currentLang].edit_btn;
      rangeEl.start.value = seg.start;
      rangeEl.end.value = seg.end;
    };
  });

  document.querySelectorAll('.btn-range-del').forEach(b => {
    b.onclick = () => {
      const i = parseInt(b.dataset.i, 10);
      rangeList.splice(i, 1);
      rangeEditIndex = -1;
      updateRangeStatus();
      renderRangeAddedList();
      resetRangeDependentState();
    };
  });
}

document.querySelectorAll('.config-item').forEach(item => {

    item.classList.add('active');

function updateSegStatus() {
  const lang = i18n[currentLang];
  if (segmentList.length > 0) {
    el.segStatus.textContent = lang.added;
    el.segStatus.className = "seg-status added";
  } else {
    el.segStatus.textContent = lang.unadded;
    el.segStatus.className = "seg-status unadded";
  }
}

function isFullyCovered() {
  const total = getCurrentRangeLength();
  if (total === 0) return false;
  const used = new Set();
  segmentList.forEach(s => { for (let i = s.start; i <= s.end; i++) used.add(i); });
  for (let i = 1; i <= total; i++) if (!used.has(i)) return false;
  return true;
}

function isOverlap(newStart, newEnd) {
  for (let i = 0; i < segmentList.length; i++) {
    if (i === editIndex) continue;
    const seg = segmentList[i];
    if (!(newEnd < seg.start || newStart > seg.end)) return true;
  }
  return false;
}

function openSegModal() {
  editIndex = -1;
  const lang = i18n[currentLang];
  segEl.formTitle.textContent = lang.add_segment;
  segEl.saveBtn.textContent = lang.add_btn;

  let nextStart = 1;
  if (segmentList.length > 0) {
    const last = segmentList[segmentList.length - 1];
    nextStart = last.end + 1;
  }
  const maxEnd = getCurrentRangeLength() || 0;
  if (nextStart > maxEnd) nextStart = "";

  const maxText = currentLang === "zh" ? `最大: ${maxEnd}` : `Max: ${maxEnd}`;
  segEl.start.value = nextStart || "";
  segEl.end.placeholder = maxEnd > 0 ? maxText : "";
  segEl.end.value = "";
  segEl.type.value = "split";
  segEl.arg.value = 2000;
  segEl.argWrap.style.display = "block";
  segEl.modal.classList.add("show");

  const full = isFullyCovered();

segEl.finishBtn.addEventListener('click', closeSegModal);

segEl.type.addEventListener('change', () => {

segEl.saveBtn.addEventListener('click', () => {
  const maxEnd = getCurrentRangeLength() || 0;
  let s = parseInt(segEl.start.value) || 0;
  let e = parseInt(segEl.end.value) || 0;
  const t = segEl.type.value;
  let a = parseInt(segEl.arg.value, 10) || 0;

  if (isFullyCovered()) { segEl.saveBtn.disabled = true; return; }
  if (s <= 0 || e <= 0) { alert(lang.gt0_error); return; }
  if (s > e) { alert(lang.s_gt_e_error); return; }
  if (e > maxEnd && maxEnd > 0) e = maxEnd;
  if (isOverlap(s, e)) { alert(lang.overlap_error); return; }

  const segLength = e - s + 1;
  if (t === 'split' && (a <= 0 || a > segLength)) {
    alert(lang.invalid_size_error); return;
  }
  if (t === 'count' && (a <= 0 || a > segLength)) {
    alert(lang.invalid_count_error); return;
  }

  const item = { start: s, end: e, type: t, arg: a };
  if (editIndex === -1) segmentList.push(item);
  else segmentList[editIndex] = item;

  updateSegStatus();
  renderAddedList();

  const full = isFullyCovered();
  segEl.saveBtn.disabled = full;
  segEl.saveBtn.title = full ? (currentLang === "zh" ? "已全覆盖" : "All covered") : "";

  if (full) { segEl.start.value = ""; segEl.end.value = ""; }
  else { segEl.start.value = e + 1; segEl.end.value = ""; }

el.numberInput.addEventListener('input', updateStats);

function getPositiveInt(value, fallback) {
  const n = parseInt(value, 10);
  return Number.isFinite(n) && n > 0 ? n : fallback;
}

function stripFileExtension(name) {
  const clean = String(name || '').trim().replace(/\.[^.\/\\]+$/, '');
  return clean || '号码';
}

function getSourceBaseName() {
  return safeFileName(stripFileExtension(importedFileBaseName || '号码'));
}

function parsePositiveRangeNumber(inputEl, fallback = 0) {
  const raw = String((inputEl && inputEl.value) || '').trim();
  if (!raw) return fallback;
  const normalized = raw.replace(/[，,\s]/g, '');
  const n = parseInt(normalized, 10);
  return Number.isFinite(n) && n > 0 ? n : 0;
}

function parseRangeEndNumber(inputEl, total) {
  const raw = String((inputEl && inputEl.value) || '').trim();
  if (!raw) return total;
  if (/^(最后|末尾|last|end)$/i.test(raw)) return total;
  const normalized = raw.replace(/[，,\s]/g, '');
  const n = parseInt(normalized, 10);
  return Number.isFinite(n) && n > 0 ? n : 0;
}

function getRangeLabel() {
  const total = validNumbers.length || workingNumbers.length || 0;
  const mode = getActiveRangeMode();

  if (mode === 'first') {
    const n = getPositiveInt(el.rangeFirstInput && el.rangeFirstInput.value, 0);
    return n > 0 ? `前${Math.min(n, total || n)}条` : '前N条';
  }

  if (mode === 'last') {
    const n = getPositiveInt(el.rangeLastInput && el.rangeLastInput.value, 0);
    return n > 0 ? `后${Math.min(n, total || n)}条` : '后N条';
  }

  if (mode === 'custom') {
    const s = parsePositiveRangeNumber(el.rangeCustomStartInput, 1) || 1;
    const e = parseRangeEndNumber(el.rangeCustomEndInput, total) || (total || '最后');
    return `${s}-${e}数据`;
  }

  return '全部数据';
}

function getZipFileName() {
  return safeFileName(`${getSourceBaseName()}切割结果.zip`);
}

function getActiveGroupLabel(i) {
  return `第${i + 1}组（${chunks[i] ? chunks[i].length : 0}个）`;
}

function getDirectChunkFileName(i) {
  // 所有单个 TXT 和 ZIP 内部 TXT 统一使用：第几组（多少个）.txt
  return getGroupFileName(i);
}

function getActiveRangeMode() {
  const active = document.querySelector('.range-item.active');
  return active ? (active.dataset.range || 'all') : rangeMode;
}

function getRangeNumbers(showAlert = false) {
  const lang = i18n[currentLang];
  const total = validNumbers.length;
  const mode = getActiveRangeMode();
  rangeMode = mode;

  if (!total) return [];

  if (mode === 'all') {
    return validNumbers.slice();
  }

  if (mode === 'first') {
    const n = getPositiveInt(el.rangeFirstInput && el.rangeFirstInput.value, 0);
    if (n <= 0) {
      if (showAlert) alert(lang.range_invalid_error);
      return null;
    }
    return validNumbers.slice(0, Math.min(n, total));
  }

  if (mode === 'last') {
    const n = getPositiveInt(el.rangeLastInput && el.rangeLastInput.value, 0);
    if (n <= 0) {
      if (showAlert) alert(lang.range_invalid_error);
      return null;
    }
    return validNumbers.slice(Math.max(0, total - n));
  }

  if (mode === 'custom') {
    const s = parsePositiveRangeNumber(el.rangeCustomStartInput, 1);
    let e = parseRangeEndNumber(el.rangeCustomEndInput, total);

    // 自定义范围：起始默认第 1 条，结束留空/填“最后”默认到最后。
    // 支持 12000、12,000、12 000 这类输入；结束超过总数时自动按最后一条处理。
    if (s <= 0 || e <= 0 || s > e) {
      if (showAlert) alert(lang.range_invalid_error);
      return null;
    }

    if (s > total) {
      if (showAlert) alert(lang.range_empty_error);
      return null;
    }

    e = Math.min(e, total);
    const result = validNumbers.slice(s - 1, e);

    if (!result.length) {
      if (showAlert) alert(lang.range_empty_error);
      return null;
    }

    return result;
  }

  return validNumbers.slice();
}

function getCurrentRangeLength() {
  const arr = getRangeNumbers(false);
  return Array.isArray(arr) ? arr.length : 0;
}

function getUncoveredCount() {
  const total = workingNumbers.length;
  if (!total || segmentList.length === 0) return total;

  const covered = new Set();
  segmentList.forEach(seg => {
    const start = Math.max(1, seg.start);
    const end = Math.min(total, seg.end);
    for (let i = start; i <= end; i++) covered.add(i);
  });

  return Math.max(0, total - covered.size);
}

el.processBtn.addEventListener('click', () => {
  if (!validNumbers.length) return;
  el.loading.classList.add('show');
  setTimeout(() => {
    const selectedRange = getRangeNumbers(true);
    if (!selectedRange || !selectedRange.length) {
      el.loading.classList.remove('show');
      return;
    }
    workingNumbers = selectedRange;

    if (exportMode === 'direct') {
      if (currentMode === 'advanced') {
        if (segmentList.length === 0) {
          alert(i18n[currentLang].unadded);
          openSegModal();
          el.loading.classList.remove('show');
          return;
        }
        const missing = getUncoveredCount();
        if (missing > 0) {
          const ok = confirm("还有 " + missing + " 个有效号码未被任何分段覆盖，是否继续？");
          if (!ok) {
            el.loading.classList.remove('show');
            return;
          }
        }
        doAdvanced(false);
      } else {
        doNormal(false);
      }

      el.resultWrapper.style.display = 'none';
      el.previewTable.innerHTML = '';
      exportDirectResult();
      el.loading.classList.remove('show');
      return;
    }

    if (currentMode === 'advanced') {
      if (segmentList.length === 0) {
        alert(i18n[currentLang].unadded);
        openSegModal();
        el.loading.classList.remove('show');
        return;
      }
      const missing = getUncoveredCount();
      if (missing > 0) {
        const ok = confirm(currentLang === "zh"
          ? ("还有 " + missing + " 个有效号码未被任何分段覆盖，是否继续？")
          : (missing + " valid numbers are not covered by any segment. Continue?"));
        if (!ok) {
          el.loading.classList.remove('show');
          return;
        }
      }
      doAdvanced();
    } else {
      doNormal();
    }
    el.resultWrapper.style.display = 'block';
    el.loading.classList.remove('show');
  }, 100);
});

function doNormal(shouldRender = true) {
  chunks = [];
  selectedGroups.clear();
  const source = workingNumbers.slice();

  if (currentMode === 'size') {
    const size = getPositiveInt(el.splitSizeInput && el.splitSizeInput.value, 2000);
    for (let i = 0; i < source.length; i += size) {
      chunks.push(source.slice(i, i + size));
    }
  } else {
    const cnt = getPositiveInt(el.splitCountInput && el.splitCountInput.value, 1);
    const per = Math.max(1, Math.ceil(source.length / cnt));
    for (let i = 0; i < source.length; i += per) {
      chunks.push(source.slice(i, i + per));
    }
  }

  if (shouldRender) renderTable();
}

function doAdvanced(shouldRender = true) {
  chunks = []; selectedGroups.clear();
  const source = workingNumbers.slice();
  segmentList.forEach(seg => {
    const slice = source.slice(seg.start - 1, seg.end);
    if (!slice.length) return;
    if (seg.type === 'split') {
      const s = seg.arg;
      for (let i = 0; i < slice.length; i += s) chunks.push(slice.slice(i, i + s));
    } else {
      const c = seg.arg;
      const p = Math.ceil(slice.length / c);
      for (let i = 0; i < slice.length; i += p) chunks.push(slice.slice(i, i + p));
    }
  });
  if (shouldRender) renderTable();
}

function exportDirectResult() {
  if (!chunks.length) return;

  if (chunks.length === 1) {
    downloadBlob(makeTxtBlob(chunks[0]), getDirectChunkFileName(0));
    return;
  }

  const indexes = chunks.map((_, i) => i);
  exportIndexes(indexes, getZipFileName(), false, getDirectChunkFileName);
}

function getGroupTitle(i) {
  const lang = i18n[currentLang];
  return lang.group.replace('{{index}}', i + 1).replace('{{count}}', chunks[i].length);
}

function refreshColumnSelection(index) {
  const active = selectedGroups.has(index);
  const th = el.previewTable.querySelector('th[data-i="' + index + '"]');
  if (th) {
    th.classList.toggle('active', active);
    th.textContent = (active ? '✓ ' : '') + getGroupTitle(index);
  }
  el.previewTable.querySelectorAll('td[data-i="' + index + '"]').forEach(td => {
    td.classList.toggle('active-col', active);
  });
}

function toggleGroupSelection(index) {
  index = parseInt(index, 10);
  if (!Number.isInteger(index) || index < 0 || index >= chunks.length) return;

  if (selectedGroups.has(index)) selectedGroups.delete(index);
  else selectedGroups.add(index);

  refreshColumnSelection(index);
}

function getSelectedGroupIndexes() {
  // 从 Set 和表头 active 状态双重读取，避免 UI 状态和导出状态不同步。
  const merged = new Set();

  selectedGroups.forEach(i => {
    if (Number.isInteger(i) && i >= 0 && i < chunks.length) merged.add(i);
  });

  el.previewTable.querySelectorAll('th.active[data-i]').forEach(th => {
    const i = parseInt(th.dataset.i, 10);
    if (Number.isInteger(i) && i >= 0 && i < chunks.length) merged.add(i);
  });

  selectedGroups = merged;
  return [...merged].sort((a, b) => a - b);
}

function renderTable() {
  el.previewTable.innerHTML = '';
  const maxRow = Math.max(...chunks.map(c => c.length), 0);
  const head = document.createElement('thead');
  const htr = document.createElement('tr');

  chunks.forEach((c, i) => {
    const th = document.createElement('th');
    th.dataset.i = i;
    th.title = currentLang === "zh" ? "点击选择/取消该分组" : "Click to select/unselect this group";
    th.onclick = () => toggleGroupSelection(i);
    htr.appendChild(th);
  });

  head.appendChild(htr);
  el.previewTable.appendChild(head);

  const body = document.createElement('tbody');
  for (let r = 0; r < maxRow; r++) {
    const tr = document.createElement('tr');
    chunks.forEach((c, i) => {
      const td = document.createElement('td');
      td.textContent = c[r] || '';
      td.dataset.i = i;
      td.title = currentLang === "zh" ? "点击选择/取消该分组" : "Click to select/unselect this group";
      td.onclick = () => toggleGroupSelection(i);
      tr.appendChild(td);
    });
    body.appendChild(tr);
  }
  el.previewTable.appendChild(body);

  chunks.forEach((_, i) => refreshColumnSelection(i));
}

function safeFileName(name) {
  return String(name).replace(/[\\/:*?"<>|]/g, '_');
}

function getGroupFileName(i) {
  return safeFileName(getActiveGroupLabel(i) + '.txt');
}

function downloadBlob(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 1000);
}

function makeTxtBlob(chunk) {
  return new Blob([chunk.join('\n')], { type: 'text/plain;charset=utf-8' });
}

const CRC32_TABLE = (() => {
  const table = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) {
      c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
    }
    table[n] = c >>> 0;
  }
  return table;
})();

function crc32(bytes) {
  let crc = 0xffffffff;
  for (let i = 0; i < bytes.length; i++) {
    crc = (CRC32_TABLE[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8)) >>> 0;
  }
  return (crc ^ 0xffffffff) >>> 0;
}

function getDosDateTime(date = new Date()) {
  const year = Math.max(1980, date.getFullYear());
  const dosTime = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
  const dosDate = ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
  return { dosTime, dosDate };
}

function createZipFromIndexes(indexArray, fileNameResolver = getGroupFileName) {
  if (!indexArray.length) throw new Error('No files selected');
  if (indexArray.length > 65535) throw new Error('Too many files for standard ZIP');

  const encoder = new TextEncoder();
  const localParts = [];
  const centralParts = [];
  const { dosTime, dosDate } = getDosDateTime();
  let offset = 0;

  indexArray.forEach(i => {
    if (!chunks[i]) return;

    const fileName = fileNameResolver(i);
    const nameBytes = encoder.encode(fileName);
    const data = encoder.encode(chunks[i].join('\n'));
    const crc = crc32(data);

    if (data.byteLength > 0xffffffff) {
      throw new Error('Single file too large for standard ZIP');
    }

    const local = new ArrayBuffer(30 + nameBytes.length);
    const lv = new DataView(local);
    lv.setUint32(0, 0x04034b50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0x0800, true); // UTF-8 file name
    lv.setUint16(8, 0, true);      // no compression
    lv.setUint16(10, dosTime, true);
    lv.setUint16(12, dosDate, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, data.byteLength, true);
    lv.setUint32(22, data.byteLength, true);
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true);
    new Uint8Array(local, 30).set(nameBytes);

    localParts.push(local, data);

    const central = new ArrayBuffer(46 + nameBytes.length);
    const cv = new DataView(central);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0x0800, true); // UTF-8 file name
    cv.setUint16(10, 0, true);     // no compression
    cv.setUint16(12, dosTime, true);
    cv.setUint16(14, dosDate, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, data.byteLength, true);
    cv.setUint32(24, data.byteLength, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    new Uint8Array(central, 46).set(nameBytes);

    centralParts.push(central);
    offset += local.byteLength + data.byteLength;
  });

  const centralSize = centralParts.reduce((sum, part) => sum + part.byteLength, 0);
  const centralOffset = offset;
  const fileCount = centralParts.length;

  const end = new ArrayBuffer(22);
  const ev = new DataView(end);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, fileCount, true);
  ev.setUint16(10, fileCount, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  ev.setUint16(20, 0, true);

  return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
}

function exportIndexes(indexArray, zipName, singleTxtWhenOne = false, fileNameResolver = getGroupFileName) {
  if (!indexArray.length) return;

  try {
    if (singleTxtWhenOne && indexArray.length === 1) {
      const i = indexArray[0];
      downloadBlob(makeTxtBlob(chunks[i]), fileNameResolver(i));
      return;
    }

    const zipBlob = createZipFromIndexes(indexArray, fileNameResolver);
    downloadBlob(zipBlob, zipName);
  } catch (err) {
    alert(currentLang === "zh" ? ("导出失败：" + err.message) : ("Export failed: " + err.message));
  }
}

el.exportSelectedTxt.onclick = () => {
  const arr = getSelectedGroupIndexes();
  if (arr.length === 0) {
    alert(i18n[currentLang].select_tip);
    return;
  }
  const zipName = getZipFileName();
  exportIndexes(arr, zipName, true);
};

el.exportAllTxt.onclick = () => {
  if (!chunks.length) return;
  const indexes = chunks.map((_, i) => i);
  const zipName = getZipFileName();
  exportIndexes(indexes, zipName, false);
};

el.shareSelectedTxt.onclick = async () => {
  const arr = getSelectedGroupIndexes();
  if (arr.length === 0) {
    alert(i18n[currentLang].select_tip);
    return;
  }
  await shareMultipleTxt(arr);
};

el.shareAllTxt.onclick = async () => {
  const indexes = chunks.map((_, i) => i);
  await shareMultipleTxt(indexes);
};

async function shareMultipleTxt(indexArray) {
  if (!indexArray.length) return;

  const files = indexArray.map(i => {
    const blob = makeTxtBlob(chunks[i]);
    return new File([blob], getGroupFileName(i), { type: 'text/plain' });
  });

  if (navigator.share && (!navigator.canShare || navigator.canShare({ files })) && files.length > 0) {
    try {
      await navigator.share({
        files,
        title: currentLang === "zh" ? "号码文件" : "Numbers",
        text: files.length + " " + (currentLang === "zh" ? "个文件" : "files")
      });
    } catch (err) {
      console.log('Share canceled or failed', err);
    }
  } else {
    alert(currentLang === "zh" ? "当前浏览器不支持文件分享，已改为下载" : "File sharing is not supported, downloading instead...");
    const zipName = getZipFileName();
    exportIndexes(indexArray, zipName, true);
  }
}

el.clearBtn.onclick = () => {
  el.numberInput.value = ''; updateStats();
  if (el.rangeFirstInput) el.rangeFirstInput.value = 2000;
  if (el.rangeLastInput) el.rangeLastInput.value = 2000;
  if (el.rangeCustomStartInput) el.rangeCustomStartInput.value = '';
  if (el.rangeCustomEndInput) el.rangeCustomEndInput.value = '';
  segmentList = []; rangeList = []; selectedGroups.clear(); workingNumbers = [];
  importedFileBaseName = "号码";
  document.querySelectorAll('.range-item').forEach(i => i.classList.remove('active'));
  const allRange = document.querySelector('.range-item[data-range="all"]');
  if (allRange) allRange.classList.add('active');
  rangeMode = 'all';
  document.querySelectorAll('.config-item').forEach(i => i.classList.remove('active'));
  const countMode = document.querySelector('.config-item[data-mode="count"]');
  if (countMode) countMode.classList.add('active');
  currentMode = 'count';
  setExportMode('direct');
  updateSegStatus();
  updateRangeStatus();
  el.resultWrapper.style.display = 'none';
  el.previewTable.innerHTML = '';
};

initFileDrop();
setExportMode('direct');
updateStats();
updateI18n();
updateSegStatus();
updateRangeStatus();
